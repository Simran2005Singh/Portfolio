<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --bg-color: #050505;
      --card-bg: rgba(20, 20, 20, 0.75);
      --card-border: rgba(255, 255, 255, 0.1);
      --text-main: #ffffff;
      --text-sub: #888888;
    }

    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: var(--bg-color);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      perspective: 1000px;
    }

    /* Starfield Background Layer */
    .starfield {
      position: absolute;
      width: 200%;
      height: 200%;
      background-image: 
        radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
        radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
        radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px);
      background-size: 550px 550px, 350px 350px, 250px 250px;
      background-position: 0 0, 40px 60px, 130px 270px;
      animation: starMove 20s linear infinite;
      opacity: 0.6;
      z-index: 1;
    }

    @keyframes starMove {
      from { transform: translate(-50%, -50%) rotate(0deg) scale(0.8); }
      to { transform: translate(-50%, -50%) rotate(360deg) scale(1.2); }
    }

    /* Floating Dark Card UI */
    .ask-card {
      position: relative;
      z-index: 10;
      width: 320px;
      padding: 24px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      animation: floatCard 6s ease-in-out infinite;
    }

    @keyframes floatCard {
      0%, 100% { transform: translateY(0px) rotateX(2deg) rotateY(-2deg); }
      50% { transform: translateY(-10px) rotateX(-2deg) rotateY(2deg); }
    }

    .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-sub);
      margin-bottom: 8px;
    }

    .command {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-main);
      margin-bottom: 4px;
    }

    .helper-text {
      font-size: 0.875rem;
      color: var(--text-sub);
    }
  </style>
  <title>/ask-me UI</title>
</head>
<body>

  <div class="starfield"></div>

  <div class="ask-card">
    <div class="label">Skills</div>
    <div class="command">/ask-me</div>
    <div class="helper-text">Clarify with questions</div>
  </div>

</body>
</html>
